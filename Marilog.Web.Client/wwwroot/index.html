<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>

    <base href="/" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marilog</title>
    <link rel="preload" href="_content/MudBlazor/MudBlazor.min.css" as="style">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
            <p style="font-family:Roboto;color:#1976d2;font-size:18px;">Marilog</p>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        window.marilogDownload = {
            downloadBytes: function (fileName, contentType, bytes) {
                const blob = new Blob([new Uint8Array(bytes)], { type: contentType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(url);
            }
        };
    </script>
</body>
</html>
